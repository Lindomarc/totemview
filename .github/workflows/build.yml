name: CI

on:
  push:
  pull_request:

jobs:
  android:
    name: Build Android
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up JDK 17
        uses: actions/setup-java@v3
        with:
          distribution: temurin
          java-version: '17'
      - name: Download Gradle wrapper cache
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/gradle-wrapper.properties', '**/build.gradle', '**/settings.gradle') }}
      - name: Build Android debug APK
        run: ./gradlew assembleDebug --no-daemon

  ios:
    name: Build iOS
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Ruby dependencies
        run: sudo gem install cocoapods --no-document || true
      - name: Build iOS app
        run: |
          if [ ! -d "ios/TotemView.xcodeproj" ]; then
            echo "No Xcode project found at ios/TotemView.xcodeproj";
            exit 1;
          fi
          mkdir -p ios/build
          xcodebuild -project ios/TotemView.xcodeproj -scheme TotemView -sdk iphoneos -configuration Release \
            -derivedDataPath ios/build/DerivedData \
            CODE_SIGNING_ALLOWED=NO CODE_SIGN_IDENTITY="" CODE_SIGNING_REQUIRED=NO DEVELOPMENT_TEAM="" \
            clean build | tee ios/build/xcodebuild.log
      - name: Package iOS app
        run: |
          if [ -d "ios/build/DerivedData/Build/Products/Release-iphoneos/TotemView.app" ]; then
            cd ios/build/DerivedData/Build/Products/Release-iphoneos
            zip -r ../../../../TotemView.app.zip TotemView.app
          else
            echo "Built app bundle not found"
            exit 1
          fi
      - name: Upload iOS build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ios-build
          path: ios/build/TotemView.app.zip
